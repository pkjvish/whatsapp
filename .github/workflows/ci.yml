  run-sender:
    name: Run WhatsApp Sender
    runs-on: ubuntu-latest
    needs: build-env
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main" \
            > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Restore WhatsApp session cache
        uses: actions/cache@v4
        with:
          path: .chrome_profile
          key: chrome-profile-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            chrome-profile-${{ runner.os }}-

      - name: Prepare test data (if not present)
        run: |
          if [ ! -f numberMessage.txt ]; then
            echo '+1234567890,"CI Test: This is a test message from GitHub Actions"' > numberMessage.txt
          fi
          mkdir -p attachments
          if [ ! -f attachments/resume.txt ]; then
            echo "This is a dummy resume for CI testing." > attachments/resume.txt
          fi

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WhatsApp sender (headless)
        id: sender
        continue-on-error: true   # allow failure so artifacts are uploaded
        run: |
          python whatsapp_sender.py --headless --delay 2
        env:
          PYTHONUNBUFFERED: 1
        timeout-minutes: 2   # enough to detect QR and exit

      - name: Check QR exit code
        if: steps.sender.outcome == 'failure'
        run: |
          echo "⚠️  QR code scan required! Download the 'qr-code' artifact, scan with WhatsApp, then re-run this workflow."
          exit 1   # mark job as failed with a clear message

      - name: Upload QR code screenshot (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qr-code
          path: qr_code.png
          retention-days: 7

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sender-logs
          path: logs/
          retention-days: 7
