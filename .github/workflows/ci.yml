name: WhatsApp Sender — CI (Selenium)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:   # still available for manual runs

jobs:
  lint-and-audit:
    name: Lint & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies + lint tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt flake8 pip-audit

      - name: Lint
        run: flake8 whatsapp_sender.py --max-line-length=100 --ignore=E501,W503

      - name: Dependency audit
        run: pip-audit -r requirements.txt || true

  test-parser:
    name: Test Contact Parser
    runs-on: ubuntu-latest
    needs: lint-and-audit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Smoke-test parse_contacts
        run: |
          python - <<'PYEOF'
          import sys
          sys.path.insert(0, ".")
          from pathlib import Path
          from whatsapp_sender import parse_contacts
          contacts = parse_contacts(Path("numberMessage.txt"))
          assert contacts, "No contacts parsed!"
          for c in contacts:
              assert c["number"].startswith("+"), f"Bad number: {c['number']}"
              assert c["message"], "Empty message"
          print(f"✅  Parsed {len(contacts)} contact(s) OK.")
          PYEOF

  build-env:
    name: Build Environment & Verify Selenium
    runs-on: ubuntu-latest
    needs: test-parser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main" \
            > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Remove old broken WebDriver cache (if any)
        run: |
          rm -rf ~/.wdm
          rm -rf ~/.cache/selenium

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade selenium
          pip install -r requirements.txt

      - name: Verify Selenium + ChromeDriver (no webdriver_manager)
        run: |
          python - <<'PYEOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from rich.console import Console

          console = Console()
          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          driver = webdriver.Chrome(options=opts)
          driver.get("https://www.google.com")
          console.print(f"[green]✅ Selenium OK — title: {driver.title}[/green]")
          driver.quit()
          PYEOF

      - name: Upload requirements lock
        run: pip freeze > requirements.lock

      - uses: actions/upload-artifact@v4
        with:
          name: requirements-lock
          path: requirements.lock
          retention-days: 30

  run-sender:
    name: Run WhatsApp Sender
    runs-on: ubuntu-latest
    needs: build-env
    # No condition – runs on every push/PR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main" \
            > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Restore WhatsApp session cache
        uses: actions/cache@v4
        with:
          path: .chrome_profile
          key: chrome-profile-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            chrome-profile-${{ runner.os }}-

      - name: Prepare test data (if not present)
        run: |
          # Create a test contacts file with a dummy number
          if [ ! -f numberMessage.txt ]; then
            echo '+1234567890,"CI Test: This is a test message from GitHub Actions"' > numberMessage.txt
          fi
          # Create attachments directory and dummy resume
          mkdir -p attachments
          if [ ! -f attachments/resume.txt ]; then
            echo "This is a dummy resume for CI testing." > attachments/resume.txt
          fi

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WhatsApp sender (headless)
        run: |
          python whatsapp_sender.py --headless --delay 2
        env:
          PYTHONUNBUFFERED: 1
        timeout-minutes: 3   # prevents hanging if QR scan needed

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sender-logs
          path: logs/
          retention-days: 7
